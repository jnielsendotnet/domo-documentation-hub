# Update docs.json Navigation on Merge
#
# This workflow runs when OpenAPI YAML files are merged to main.
# It regenerates the docs.json navigation to include any new/changed endpoints.
#
# Use this with the PR-based sync workflow (sync-with-prs.yml).

name: Update Navigation

on:
  push:
    branches: [main]
    paths:
      - 'openapi/**/*.yaml'
      - 'openapi/**/*.yml'

jobs:
  update-navigation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update API Navigation
        uses: DomoApps/documentation-generator-action@main
        with:
          yaml_input_path: './openapi/product'
          docs_json_path: './docs.json'
          openapi_base_path: 'openapi/product'

      - name: Commit Updated Navigation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs.json
          git diff --staged --quiet || git commit -m "docs: Update API navigation"
          git push
