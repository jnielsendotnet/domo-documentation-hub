openapi: 3.0.0
info:
  title: Dataset Schema API
  version: v2
  description: API for retrieving the schema of a specified Domo Dataset.
servers:
  - url: 'https://{instance}.domo.com'
    description: Domo Instance
    variables:
      instance:
        default: 'api'
        description: 'Your specific Domo instance name (e.g., mycompany)'
tags:
  - name: Datasets
    description: Retrieve Dataset schema information.
components:
  securitySchemes:
    developerToken:
      type: apiKey
      in: header
      name: X-DOMO-Developer-Token
      description: Domo Developer Token for authentication.
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: A human-readable error message.
          
    ColumnMetadata:
      type: object
      properties:
        colLabel:
          type: string
        colFormat:
          type: string
        isEncrypted:
          type: boolean
          
    ColumnSchema:
      type: object
      properties:
        type:
          type: string
          example: "STRING"
        name:
          type: string
          example: "Column Name"
        id:
          type: string
          example: "<ID>"
        visible:
          type: boolean
        metadata:
          $ref: '#/components/schemas/ColumnMetadata'

    DatasetSchemaResponse:
      type: object
      properties:
        schema:
          type: object
          properties:
            columns:
              type: array
              items:
                $ref: '#/components/schemas/ColumnSchema'

security:
  - developerToken: []

paths:
  /api/data/v2/datasources/{DATASET_ID}/schemas/latest:
    get:
      summary: Return the schema for a specified Dataset
      description: Retrieves the latest schema definition for a given Dataset ID.
      tags: [Dataset Schema API]
      parameters:
        - name: DATASET_ID
          in: path
          required: true
          description: The ID of the Dataset.
          schema:
            type: string # Dataset IDs are often UUIDs
            example: "aa7d9422-9abe-4581-bbf3-4a8cb5d3fc25"
      responses:
        '200':
          description: OK. Returns the schema object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetSchemaResponse'
              example:
                schema:
                  columns:
                    - type: "STRING"
                      name: "Example Column"
                      id: "col_1"
                      visible: true
                      metadata:
                        colLabel: "Example Column Label"
                        colFormat: ""
                        isEncrypted: false
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Dataset Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'