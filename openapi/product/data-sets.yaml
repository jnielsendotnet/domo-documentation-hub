      tags:
        - Datasets API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetCreateRequest'
            example:
              userDefinedType: "api"
              dataSourceName: "hello world"
              schema:
                columns:
                  - type: "STRING"
                    name: "Friend"
                  - type: "STRING"
                    name: "Attending"
      responses:
        '200':
          description: Dataset created
      x-codeSamples:
        - lang: HTTP
          source: |
            POST /api/data/v2/datasources HTTP/1.1
            Host: {instance}.domo.com
            X-DOMO-Developer-Token: {token}
            Content-Type: application/json

            {
              "userDefinedType": "api",
              "dataSourceName": "hello world",
              "schema": {
                "columns": [
                  {
                    "type": "STRING",
                    "name": "Friend"
                  },
                  {
                    "type": "STRING",
                    "name": "Attending"
                  }
                ]
              }
            }

  /api/query/v1/datasources/{datasetId}/schema/indexed:
    get:
      summary: Get Dataset Schema
      description: Retrieves the schema of a dataset, including details about columns, their types, and metadata
      tags:
