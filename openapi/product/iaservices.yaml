openapi: 3.0.0
info:
  title: AI Services API
  version: v1
  description: API for Domo's AI services, including Text Generation, Text-to-SQL, and Summarization.
servers:
  - url: 'https://example.com/v1'
    description: Domo Instance
    variables:
      instance:
        default: 'api'
        description: 'Your specific Domo instance name (e.g., mycompany)'
tags:
  - name: AI Services
    description: Endpoints for AI-powered text operations.
components:
  securitySchemes:
    developerToken:
      type: apiKey
      in: header
      name: X-DOMO-Developer-Token
      description: Domo Developer Token for authentication.
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: A human-readable error message.
          
    PromptTemplate:
      type: object
      description: "A prompt template object. The 'template' string should contain placeholders."
      properties:
        template:
          type: string
          example: "Respond to the following in ${language}: ${input}"
          
    AIResponse:
      type: object
      description: Standard successful AI response.
      properties:
        output:
          type: string
        modelId:
          type: string
          
    ModelParameters:
      type: object
      description: Custom parameters to inject into the prompt template.
      additionalProperties: true
      example:
        language: "Japanese"
        
    ModelConfiguration:
      type: object
      description: "Additional model-specific configuration key-value pairs (e.g., temperature)."
      additionalProperties: true
      example:
        temperature: 0.7
        max_tokens: 1024

    #========= TEXT GENERATION SCHEMAS =========
    TextGenerationRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
          description: The input text to send to the model.
        model:
          type: string
          description: The ID of the model to use.
        modelConfiguration:
          $ref: '#/components/schemas/ModelConfiguration'
        promptTemplate:
          $ref: '#/components/schemas/PromptTemplate'
        parameters:
          $ref: '#/components/schemas/ModelParameters'
        system:
          type: string
          description: The system message to use for the Text Generation task. If not provided, the default system message will be used. If the model does not include built-in support for system prompts, this parameter may be included in the prompt template using the "${system}" placeholder. 
          
    #========= TEXT-TO-SQL SCHEMAS =========
    DataSourceColumn:
      type: object
      properties:
        type:
          type: string
          enum: [STRING, LONG, DECIMAL, DOUBLE, DATE, DATETIME]
        name:
          type: string
        description:
          type: string
          nullable: true
          
    DataSourceSchema:
      type: object
      properties:
        dataSourceName:
          type: string
        description:
          type: string
          nullable: true
        columns:
          type: array
          items:
            $ref: '#/components/schemas/DataSourceColumn'
            
    TextToSQLRequest:
      type: object
      required: [input, dataSourceSchemas]
      properties:
        input:
          type: string
          description: The input text to send to the model.
        dataSourceSchemas:
          type: array
          items:
            $ref: '#/components/schemas/DataSourceSchema'
        model:
          type: string
          description: The ID of the model to use.
        modelConfiguration:
          $ref: '#/components/schemas/ModelConfiguration'
        promptTemplate:
          $ref: '#/components/schemas/PromptTemplate'
        parameters:
          $ref: '#/components/schemas/ModelParameters'
        system:
          type: string
          description: The system message to use.
          
    #========= TEXT SUMMARIZATION SCHEMAS =========
    OutputWordLength:
      type: object
      properties:
        min:
          type: integer
        max:
          type: integer
      example:
        min: 5
        max: 10
        
    TextSummarizationRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
          description: The input text to send to the model.
        outputStyle:
          type: string
          description: The formatting of the summarized output.
          enum: [BULLETED, NUMBERED, PARAGRAPH]
        outputWordLength:
          $ref: '#/components/schemas/OutputWordLength'
        model:
          type: string
          description: The ID of the model to use.
        modelConfiguration:
          $ref: '#/components/schemas/ModelConfiguration'
        promptTemplate:
          $ref: '#/components/schemas/PromptTemplate'
        parameters:
          $ref: '#/components/schemas/ModelParameters'
        system:
          type: string
          description: The system message to use.

security:
  - developerToken: []

paths:
  /api/ai/v1/text/generation:
    post:
      summary: Text Generation
      description: Generate text based on the given text input.
      tags: [AI Services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextGenerationRequest'
            examples:
              Basic:
                summary: Basic Example
                value:
                  input: "Why is the sky blue?"
              PromptTemplate:
                summary: Prompt Template Example
                value:
                  input: "Why is the sky blue?"
                  promptTemplate:
                    template: "Respond to the following in ${language}: ${input}"
                  parameters:
                    language: "Japanese"
                  model: "domo.domo_ai.domogpt-chat-small-v1:anthropic"
              SystemMessage:
                summary: System Message Example
                value:
                  input: "Why is the sky blue?"
                  system: "Respond only in Japanese"
                  model: "domo.domo_ai.domogpt-chat-small-v1:anthropic"
      responses:
        '200':
          description: The generated text.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIResponse'
              example:
                output: "The sky is blue because of Rayleigh scattering."
                modelId: "domo.domo_ai.domogpt-chat-small-v1:anthropic"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ai/v1/text/sql:
    post:
      summary: Text-to-SQL
      description: Generate SQL based on the given text input and schemas.
      tags: [AI Services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextToSQLRequest'
            example:
              input: "What are my total sales by region?"
              dataSourceSchemas:
                - dataSourceName: "Store Sales"
                  description: ""
                  columns:
                    - { type: "STRING", name: "product", description: "" }
                    - { type: "LONG", name: "store", description: "" }
                    - { type: "LONG", name: "amount", description: "" }
                    - { type: "DATETIME", name: "timestamp", description: "" }
                    - { type: "STRING", name: "region", description: "" }
      responses:
        '200':
          description: The generated SQL query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIResponse'
              example:
                output: "SELECT region, SUM(amount) AS total_sales FROM `Store Sales` GROUP BY region"
                modelId: "domo.domo_ai.domogpt-sql-v1:anthropic"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ai/v1/text/summarize:
    post:
      summary: Text Summarization
      description: Generate a summary based on the given text input.
      tags: [AI Services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TextSummarizationRequest'
            examples:
              Basic:
                summary: Basic Example
                value:
                  input: "San Francisco, officially the City and County of San Francisco, is a commercial, financial, and cultural center..."
              Customized:
                summary: Customized Example
                value:
                  input: "San Francisco, officially the City and County of San Francisco, is a commercial, financial, and cultural center..."
                  outputWordLength:
                    min: 5
                    max: 10
                  outputStyle: "PARAGRAPH"
                  model: "domo.domo_ai.domogpt-summarize-v1:anthropic"
      responses:
        '200':
          description: The generated text summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIResponse'
              example:
                output: "Vibrant, densely populated commercial and cultural hub in Northern California."
                modelId: "domo.domo_ai.domogpt-summarize-v1:anthropic"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'