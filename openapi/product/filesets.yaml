openapi: 3.0.0
info:
  title: FileSets API (BETA) (Product)
  version: v1
  description: |
    <Note>
    BETA: This API is currently in BETA and is subject to change. 
    Endpoints, request/response formats, and functionality may change without notice.
    <Note>
    API for managing FileSets and Files in Domo.
servers:
  - url: 'https://example.com/v1'
    description: Domo Instance
    variables:
      instance:
        default: 'api'
        description: 'Your specific Domo instance name (e.g., mycompany)'
tags:
  - name: File
    description: Operations for managing individual files within a FileSet.
  - name: FileSet
    description: Operations for managing FileSets (collections of files).
components:
  securitySchemes:
    developerToken:
      type: apiKey
      in: header
      name: X-DOMO-Developer-Token
      description: Domo Developer Token for authentication.
  schemas:
    #========= SHARED SCHEMAS =========
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: A human-readable error message.
    DeleteSuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "File deleted successfully."

    #========= FILE SCHEMAS =========
    FileMetadataBase: # Common fields in file responses (Search, Upload)
      description: Basic metadata for a file.
      type: object
      properties:
        id: { type: string, format: uuid }
        path: { type: string }
        name: { type: string }
        fileType: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }
        created: { type: string, format: date-time }
        createdBy: { type: integer }

    FileMetadataFull: # Adds hash, downloadUrl etc. (Get File by Path/ID)
      description: Full metadata for a file.
      allOf:
        - $ref: '#/components/schemas/FileMetadataBase'
        - type: object
          properties:
            hash: { type: string }
            hashAlgorithm: { type: string }
            downloadUrl: { type: string, format: url, nullable: true }
            connectorKey: { type: string, nullable: true }
            indexStatus: { type: string, nullable: true }
            indexReason: { type: string, nullable: true }
            # Add fields from Search response example if needed
            # type: { type: string } # Seems redundant with fileType/contentType

    #========= FILESET SCHEMAS =========
    FileSetMetadataBase: # Common fields (Create, Update, Get)
      description: Base metadata for a FileSet.
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        created: { type: string, format: date-time }
        createdBy: { type: integer }

    FileSetMetadataSearch: # Fields from Search response
      description: Metadata for a FileSet as returned by search.
      allOf:
        - $ref: '#/components/schemas/FileSetMetadataBase'
        - type: object
          properties:
            updated: { type: string, format: date-time }
            updatedBy: { type: integer }
            owner: { type: string } # Assuming owner ID
            permission: { type: string }
            fileCount: { type: integer }

    FileSetMetadataFull: # Fields from Get By ID response (seems more complete than search?)
      description: Detailed metadata for a FileSet.
      allOf:
        - $ref: '#/components/schemas/FileSetMetadataBase'
        - type: object
          properties:
            aiEnabled: { type: boolean }
            indexStatus: { type: string, nullable: true }
            batchType: { type: string }
            connector: { type: string }
            updated: { type: string, format: date-time }
            updatedBy: { type: integer }
            owner: { type: string } # Assuming owner ID
            accountId: { type: integer }
            connectorContext: { $ref: '#/components/schemas/ConnectorContext', nullable: true }
            permission: { type: string }
            size: { type: integer, format: int64 }
            fileCount: { type: integer }

    ConnectorContext:
      type: object
      required: [connector]
      properties:
        connector: { type: string, description: "The connector key." }
        relativePath: { type: string, nullable: true, description: "Relative path for the connector." }

    CreateFileSetRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, description: "The name of the FileSet." }
        accountId: { type: integer, nullable: true, description: "The account ID to associate." }
        connectorContext: { $ref: '#/components/schemas/ConnectorContext', nullable: true }
        description: { type: string, nullable: true, description: "Description for the FileSet." }

    UpdateFileSetRequest:
      type: object
      properties:
        name: { type: string, description: "The new name for the FileSet." }
        description: { type: string, nullable: true, description: "The new description for the FileSet." }

    #========= QUERY & SEARCH SCHEMAS =========
    QueryFilesRequest:
      type: object
      required: [query] # Changed from queryString based on example
      properties:
        query: { type: string, description: "Text to search for in Files." }
        directoryPath: { type: string, nullable: true, description: "Limit search to a specific directory." }
        topK: { type: integer, nullable: true, description: "Maximum number of results to return." }

    QueryNode: # Node within a query match
      type: object
      properties:
        id: { type: string, format: uuid }
        path: { type: string }
        name: { type: string }
        fileType: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }
        created: { type: integer, format: int64 } # Example shows epoch ms
        type: { type: string } # Example shows 'TEXT'

    QueryMatch: # A single match from Query Files
      type: object
      properties:
        id: { type: string, format: uuid } # ID seems redundant with node.id
        node: { $ref: '#/components/schemas/QueryNode' }
        score: { type: number, format: float }

    QueryFilesResponse:
      type: object
      properties:
        matches:
          type: array
          items: { $ref: '#/components/schemas/QueryMatch' }

    FieldSort:
      type: object
      properties:
        field: { type: string, description: "Field name to sort by." }
        order: { type: string, description: "Sort direction.", enum: [ASC, DESC] }

    Filter:
      type: object
      properties:
        field: { type: string, description: "Field name to filter on." }
        value: { type: array, items: { type: string }, description: "Values to match against." }
        not: { type: boolean, default: false }
        operator: { type: string, description: "Operation type: 'EQUALS', 'IN', 'LIKE', etc.", enum: [EQUALS, GREATER_THAN, LESS_THAN, LESS_THAN_OR_EQUAL, GREATER_THAN_OR_EQUAL, IN, IS_NULL, LIKE] }

    DateFilter:
      type: object
      properties:
        field: { type: string, description: "Field name for date filter (e.g., 'created')." }
        start: { type: string, format: date-time, description: "Start timestamp as ISO string." }
        end: { type: string, format: date-time, description: "End timestamp as ISO string." }
        not: { type: boolean, default: false }

    SearchBody: # Reusable for File and FileSet search
      description: Body for search operations on Files or FileSets.
      type: object
      properties:
        fieldSort: { type: array, items: { $ref: '#/components/schemas/FieldSort' } }
        filters: { type: array, items: { $ref: '#/components/schemas/Filter' } }
        dateFilters: { type: array, items: { $ref: '#/components/schemas/DateFilter' } }

    PageContext:
      type: object
      properties:
        next: { type: string, nullable: true, description: "Pagination token for fetching the next set of results." }
        # Adding fields from FileSet search response
        offset: { type: integer }
        limit: { type: integer }
        total: { type: integer }

    SearchFilesResponse:
      type: object
      properties:
        files: { type: array, items: { $ref: '#/components/schemas/FileMetadataFull' } } # Using Full based on example
        pageContext: { $ref: '#/components/schemas/PageContext' }

    SearchFileSetsResponse:
      type: object
      properties:
        fileSets: { type: array, items: { $ref: '#/components/schemas/FileSetMetadataSearch' } } # Using Search variant based on example
        pageContext: { $ref: '#/components/schemas/PageContext' }

security:
  - developerToken: []

paths:
  #========= FileSet Endpoints =========
  /api/files/v1/filesets:
    post:
      summary: Create FileSet
      description: Creates a new FileSet.
      tags:
        - FileSets API (BETA) (Product)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFileSetRequest' }
      responses:
        '200':
          description: The metadata for the created FileSet.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileSetMetadataBase' } # Base response matches example
        '401': { description: Unauthorized }

  /api/files/v1/filesets/search:
    post:
      summary: Search FileSets
      description: Searches for FileSets based on filter criteria.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 100 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      requestBody:
        description: Search criteria. Send an empty object {} to list all.
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SearchBody' }
      responses:
        '200':
          description: A list of matching FileSets.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchFileSetsResponse' }
        '401': { description: Unauthorized }

  /api/files/v1/filesets/{filesetId}:
    get:
      summary: Get FileSet by Id
      description: Retrieves metadata for a specific FileSet.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: The FileSet metadata.
          content:
            application/json:
              # Example response differs slightly between Search and GetByID. Using Full here.
              schema: { $ref: '#/components/schemas/FileSetMetadataFull' }
        '401': { description: Unauthorized }
        '404': { description: FileSet Not Found }
    post: # Doc says POST for update, which is unusual. Following doc.
      summary: Update FileSet by Id
      description: Updates the name or description of a FileSet.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateFileSetRequest' }
      responses:
        '200':
          description: The updated FileSet metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileSetMetadataBase' } # Response example only shows base fields
        '401': { description: Unauthorized }
        '404': { description: FileSet Not Found }
    delete:
      summary: Delete FileSet by Id
      description: Deletes a FileSet and all its contents.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Success message.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeleteSuccessResponse' }
        '401': { description: Unauthorized }
        '404': { description: FileSet Not Found }

  #========= File Endpoints =========
  /api/files/v1/filesets/{filesetId}/path:
    get:
      summary: Get File by Path
      description: Retrieves a File's metadata using its path.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: path, in: query, required: true, schema: { type: string }, description: "The path to the File within the FileSet." }
      responses:
        '200':
          description: Full file metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileMetadataFull' }
        '401': { description: Unauthorized }
        '404': { description: Not Found }
    delete:
      summary: Delete File by Path
      description: Deletes a File using its path.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: path, in: query, required: true, schema: { type: string }, description: "The path to the File within the FileSet." }
      responses:
        '200':
          description: Success message.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeleteSuccessResponse' }
        '401': { description: Unauthorized }
        '404': { description: Not Found }

  /api/files/v1/filesets/{filesetId}/files:
    post:
      summary: Upload File
      description: Uploads a new file to a FileSet using multipart/form-data.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file blob.
                createFileRequest:
                  type: string
                  description: "A JSON string defining upload options, e.g., '{directoryPath: }."
            encoding:
              createFileRequest: { contentType: application/json }
      responses:
        '200':
          description: Basic metadata for the uploaded file.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileMetadataBase' }
        '401': { description: Unauthorized }
        '404': { description: FileSet Not Found }

  /api/files/v1/filesets/{filesetId}/files/{fileId}:
    get:
      summary: Get File by Id
      description: Retrieves a File's metadata using its ID.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: fileId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Full file metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileMetadataFull' }
        '401': { description: Unauthorized }
        '404': { description: Not Found }
    delete:
      summary: Delete File by Id
      description: Deletes a File using its ID.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: fileId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Success message.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeleteSuccessResponse' }
        '401': { description: Unauthorized }
        '404': { description: Not Found }

  /api/files/v1/filesets/{filesetId}/files/{fileId}/download:
    get:
      summary: Download File by Id
      description: Downloads the binary content of a File.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: fileId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: The file contents (binary/text stream).
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '401': { description: Unauthorized }
        '404': { description: Not Found }

  /api/files/v1/filesets/{filesetId}/query:
    post:
      summary: Query Files
      description: Performs a text-based search for content within files in a FileSet.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueryFilesRequest' }
      responses:
        '200':
          description: A list of matching files with relevance scores.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueryFilesResponse' }
        '401': { description: Unauthorized }
        '404': { description: FileSet Not Found }

  /api/files/v1/filesets/{filesetId}/files/search:
    post:
      summary: Search Files in FileSet
      description: Performs an advanced search for files based on metadata filters.
      tags:
        - FileSets API (BETA) (Product)
      parameters:
        - { name: filesetId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: directoryPath, in: query, schema: { type: string } }
        - { name: immediateChildren, in: query, schema: { type: boolean, default: false } }
        - { name: limit, in: query, schema: { type: integer, default: 100 } }
        - { name: next, in: query, schema: { type: string }, description: "Pagination token." }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SearchBody' }
      responses:
        '200':
          description: A paginated list of matching files.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchFilesResponse' }
        '401': { description: Unauthorized }
        '404': { description: FileSet Not Found }