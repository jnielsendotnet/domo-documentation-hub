openapi: 3.0.0
info:
  title: Code Engine API
  version: 2.0.0
  description: |
    Code Engine is a Domo-native runtime environment that can execute JavaScript or Python code. 
    In Code Engine, you can write, test, and distribute functions usable by Workflows and other Apps by Domo.
    This API allows running a configured Code Engine function.
servers:
  - url: 'https://example.com/v1'
    description: Domo API
tags:
  - name: Code Engine
    description: Operations for running Code Engine functions.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Access token obtained via Domo's authentication flow."
  schemas:
    CodeEngineInput:
      type: object
      description: Object containing the input parameters required to run the code engine function. Properties should correspond to the 'alias' of the parameter in the manifest.
      additionalProperties: true
      example:
        parameter1: "some value"
        parameter2: 12345
    CodeEngineOutput:
      type: object
      description: The result of the Code Engine function. This result is defined in the Code Engine function's "Output" tab.
      additionalProperties: true
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: A human-readable error message.
security:
  - bearerAuth: []
paths:
  /domo/codeengine/v2/packages/{functionAlias}:
    post:
      summary: Run Code Engine Function
      description: Runs a Code Engine function and returns output of that function.
      tags: 
        - Code Engine API
      parameters:
        - name: functionAlias
          in: path
          required: true
          description: The name (alias) given to the Code Engine package in the manifest.
          schema:
            type: string
      requestBody:
        description: The request body accepts an object containing the input parameters required to run the code engine function. These parameters are also defined in the `manifest.json` file and properties in the object should correspond to the `alias` of the parameter.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeEngineInput'
      responses:
        '200':
          description: Returns the result of the Code Engine function. This result is defined in the [Code Engine function and function configuration](https://domo-support.domo.com/s/article/000005173?language=en_US#function_configuration) "Output" tab. This output should also be defined in the `output` property of the `packageMapping` object in the manifest file.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeEngineOutput'
        '400':
          description: Bad Request (e.g., invalid input parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found (e.g., functionAlias does not exist)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'